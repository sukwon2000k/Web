<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>input element 2</title>
    </head>
    <body>
        <!-- 여러줄 입력 -->
        <textarea cols="40" rows="5"></textarea>
        <hr>

        <!-- 콤보박스 용 요소 -->
        <select>
            <option value="aa">사과</option>
            <option value="bb">바나나</option>
            <option value="cc">오렌지</option>
        </select>

        <!-- 옵션그룹 활용 -->
        <select>
            <optgroup label="중식">
                <option value="a">짜장면</option>
                <option value="b">짬뽕</option>
                <option value="c">볶음밥</option>
            </optgroup>
            <optgroup label="일식">
                <option value="a">초밥</option>
                <option value="b">스시</option>
                <option value="c">덮밥</option>
            </optgroup>
        </select>

        <hr>

        <fieldset>
            <legend>필드셋의 제목(개인정보)</legend>
            <label>이름: <input type="text" name="name"></label>
            <label>나이: <input type="text" name="age"></label>
        </fieldset>

        <hr>
        
        <!-- 파일선택하기 -->
        <input type="file" accept="image/png">
        <hr>
        <!-- 여러개의 파일선택 -->
        <input type="file" accept="image/*" multiple="multiple">
        <hr>

        <!-- 비교적 최근에 새로 추가된 type들 -->
        <form action="">

            <!-- 날짜 선택관련 타입들 -->
            <input type="date"> <br>
            <input type="datetime"> <!--지원안됨--> <br>
            <input type="datetime-local"> <!--나라마다 시간이달라서 그럴뿐 local까지 적으면 됨--> <br>
            <input type="month">
            <input type="week">
            <hr>

            <!-- 색상 선택 창 -->
            <input type="color"> <br>

            <!-- 이메일 입력박스 [모바일에서 키패드의 모양이 달라짐.]-->
            <input type="email"> <br>

            <!-- 전화번호 [모바일에서 키패드의 모양이 달라짐.]-->
            <input type="tel"> <br>

            <!-- 검색어 입력박스 [글씨쓰면 삭제 버튼x가 우측 끝에 표시됨]-->
            <input type="search"> <br>

            <!-- 범위지정 요소 -->
            <input type="range" min="0" max="10" step="2" value="4">

            <!-- 숫자선택 요소 -->
            <input type="number" min="210" max="300" step="5" value="230">

            <!-- url 입력 타입 [모바일에서 키패드 모양 다름]-->
            <input type="url">
        </form>

            <hr>

            <!-- 비교적 최근에 새로이 추가된 input의 속성들 -->
        <form action="">

            <!-- 힌트 글씨 표시 -->
            <input type="text" placeholder="이름을 입력하세요."><br>

            <!-- 반드시 입력해야 하는 요소에 적용하는 속성 -->
            <input type="text" required> <br>

            <!-- 글씨는 보이지만 수정불가 -->
            <input type="text" readonly value="sam"><br>

            <!-- 페이지가 로딩될때 가장 먼저 포커스를 받고 싶다면.. -->
            <input type="text" autofocus><br>

            <!-- 최대 입력 글자수 제한 -->
            <input type="text" maxlength="5"> <br>

            <!-- 자동완성기능 -->
            <input type="text" autocomplete list="datas">
            <datalist id="datas">
                <option value="canada" label="캐나다"></option>
                <option value="china" label="중국"></option>
                <option value="korea" label="한국"></option>
            </datalist>


            <hr>
            <input type="submit"><br>
        </form>
    </body>
</html>
