<!-- 웹문서 .html의 실행은 웹브라우저로 문서를 보여주는 것임 -->
<!-- 이를 편하게 해주는 VSCode의 확장프로그램 [open in browser]를 설치 -->
<!DOCTYPE html>
<html>
    <!-- 1. 화면에 보이지 않는 영역 (주소줄 영역) 웹문서를 설명하는 내용들 작성-->
    <head>
        <title>page1</title>

        <style>
            p{color: red;}
        </style>
    </head>

    <!-- 2. 브라우저의 화면영역 -->
    <body>
        <p>Hello web</p>

    </body>



</html>

<!DOCTYPE html>
<html>
    <head>
        <!-- 하나의 .html 문서안에 1개만 적용됨.. [먼저 써있는 것] -->
        <title>page2</title>

        <style>
            p{color: blue;}
        </style>
    </head>

    <body>
        <p>nice to meet you</p>
    </body>
</html>

<!-- html 요소 밖에 글씨를 써도 보임 -->
