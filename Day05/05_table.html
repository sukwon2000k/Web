<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>table style</title>

        <!-- 내부 스타일 시트 -->
        <style>
            table{
                width: 500px;
                border: 2px solid black;
                /* 내부실선이 2줄로 그려지는 것이 싫다면.. 두 선을 합치기 */
                border-collapse: collapse;
                /* 안에 있는 모든 것들의 수평정렬을 가운데로.. */

                text-align: center;
            }

            th,td{border: 1px solid black; padding: 10px 5px;} /* 위아래 여백 10px 좌우여백 5px*/

            /* 제목줄 칸들에 배경색 지정 */
            th{background-color: green; color: white;}
            
            /* 짝수들만 별도의 배경색 지정 */
            tr:nth-child(2n){background-color: gainsboro;}

            /* 첫번째 칸들의 너비를 지정 */
            td:first-child{width: 40%;}

            /* 제목줄의 아래 경계선을 적색으로.. */
            th{border-bottom: 1.5px double red;}

            /* 직접 만들지는 않았지만...그래서 보이지는 않지만... 실제 table안에 존재하는 자식요소 tbody 확인! */
            table>:nth-child(1){border: 10px solid blue;}

            /* 그래서 보통 테이블 작업할때는 자식선택자 대신 자손선택자를 권장함 */
            table>tr{color: red;} /*대상이 없음*/
            table tr{color: pink;}

            /* 책. chapter6 ~ chapter7까지 모두 완료. */
            /* 수행과제 */
            /* 1. 책 읽고 예제 모두 따라써보기.. */
            /* 2. 각 챕터의 되새김 문제..를 풀어보기.. */
        </style>
    </head>
    <body>
        
        <table>
            <tr>
                <th>이름</th>
                <th>이메일</th>
            </tr>
            <tr>
                <td>김철수</td>
                <td>aaa@gamil.com</td>
            </tr>
            <tr>
                <td>손흥민</td>
                <td>bbb@gamil.com</td>
            </tr>
            <tr>
                <td>김민재</td>
                <td>ccc.gmail.com</td>
            </tr>
            <tr>
                <td>이강인</td>
                <td>ddd.gmail.com</td>
            </tr>
        </table>
    </body>
</html>
