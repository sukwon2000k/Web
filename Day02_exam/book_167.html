<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>퍼런트엔트ㅐㄱㄱ발자ㅏㅈ이원서</title>
    </head>
    <body>
        <h1>프런트엔드 개발자 지원서</h1>
        <br>
        HTML, CSS, 자바스크립트의 기술을 이해하고 실무 경험이 있는 분을 찾습니다.
        <hr>
        <h2>개인 정보</h2>
        <form >
            <label for="name">이름</label>
            <input type="text" id="name" placeholder="공백 없이 입력하세요.">
            <label for="phone">연락처</label>
            <input type="tel" id="phone">
        </form>
        <br>
        <h2>지원 분야</h2>
        <form>
            <input type="radio" name="지원분야" id="web">
            <label for="web">웹 퍼블리싱</label> <br>
            <input type="radio" name="지원분야" id="app"> 
            <label for="app">웹 애플리케이션 개발</label> <br>
            <input type="radio" name="지원분야" id="개발환경">
            <label for="개발환경">개발 환경 개선</label> <br>
        
        <br>
        <h2>지원 동기</h2>
        
        <textarea cols="60" rows="5" placeholder="본사 지원 동기를 간략히 써 주세요." ></textarea> 
        <br>
        <input type="submit" value="접수하기"> <input type="reset" value="다시 쓰기" >
        </form>
    </body>
</html>
