<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>예약정보</title>
    </head>
    <body>
        <h1>예약 정보</h1>
        <form>
            <ul>
                <li>
                    <label for="r-name">이름</label>
                    <input type="text" id="r-name">
                </li>
                <li>

                    <input type="tel" id="r-phone">
                </li>
                <li>
                    <label for="r-mail">이메일</label>
                    <input type="email" id="r-mail">
                </li>
                <li>
                    <input type="submit" value="예약하기">
                </li>
            </ul>
        </form>
    </body>
</html>
